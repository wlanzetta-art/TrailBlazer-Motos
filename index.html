<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Ensures the website looks good on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Controls the color of the browser toolbar on some mobile devices -->
    <meta name="theme-color" content="#0f172a" />
    
    <!-- A short description for search engines like Google -->
    <meta name="description" content="TrailBlazer Motos - Premium Guided Dirt Bike Tours in Bucks County, PA" />
    
    <!-- The title that appears in the browser tab -->
    <title>TrailBlazer Motos | Guided Dirt Bike Tours</title>
  </head>
  <body>
    <!-- We need a noscript tag just in case a user has JavaScript disabled -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- THIS IS THE IMPORTANT PART: Your entire React app (App.jsx) gets loaded inside this div! -->
    <div id="root"></div>
    
    <!-- If you are building this locally using a tool like Vite, this script links your HTML to your React code. -->
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
